---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.9"
    hooks:
      - id: ruff-check
        files: "spatialml\/|docs\/"
      - id: ruff-format
        files: "spatialml\/|docs\/"
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-toml
        files: "."

ci:
  autofix_prs: false
  autoupdate_schedule: quarterly
